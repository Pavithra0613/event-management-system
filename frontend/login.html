<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - CrowdAura</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="login-container">
    <h2>Login to CrowdAura</h2>
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required />

      <button type="submit">Login</button>
      <p class="signup-link">Don't have an account? <a href="signup.html">Sign up</a></p>

      <p id="loginStatus" style="color: red; margin-top: 10px;"></p>
    </form>

    
    <div style="margin-top: 1rem; text-align: center;">
      <a href="index.html" style="
        display: inline-block;
        padding: 0.5rem 1rem;
        background-color: #f44336;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
      ">← Back to Homepage</a>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const response = await fetch("http://localhost:3000/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: email, password: password }), 
        });

        const data = await response.json();

            if (response.ok) {
      localStorage.setItem("loggedInUser", email); 
      alert(data.message);
      window.location.href = "index.html"; 
    }
      else {
                document.getElementById("loginStatus").textContent = data.message;
              }
            } catch (error) {
              document.getElementById("loginStatus").textContent = "Server error. Try again later.";
              console.error(error);
            }
          });
  </script>
</body>
</html>
