<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>List Your Event</title>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    .container {
      max-width: 600px;
      margin: 3rem auto;
      padding: 2rem;
      background-color: #1e1e1e;
      border-radius: 8px;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      text-decoration: none;
      font-size: 1.5rem;
      color: white;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    h2 {
      text-align: center;
      margin-bottom: 2rem;
    }

    input, textarea {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      border: none;
      border-radius: 4px;
      background-color: #2c2c2c;
      color: white;
    }

    button {
      background-color: #f44336;
      color: white;
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background-color: #d9362d;
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="index.html" class="close-btn" title="Close">&times;</a>
    <h2>List Your Concert Event</h2>
    <form id="eventForm">
      <input type="text" id="eventName" placeholder="Event Name" required />
      <input type="text" id="artist" placeholder="Artist or Band" required />
      <input type="text" id="location" placeholder="Location" required />
      <input type="date" id="date" required />
      <input type="time" id="time" required />
      <textarea id="description" placeholder="Event Description" rows="4" required></textarea>
      <input type="number" id="price" placeholder="Ticket Price (e.g. ₹999)" required />
      <input type="file" id="eventImage" accept="image/*" required />
      <button type="submit">Submit Event</button>
    </form>
  </div>

  <script>
    
    window.addEventListener("DOMContentLoaded", function () {
      const today = new Date().toISOString().split("T")[0];
      document.getElementById("date").setAttribute("min", today);
    });

    document.getElementById("eventForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const name = document.getElementById("eventName").value;
      const artist = document.getElementById("artist").value;
      const location = document.getElementById("location").value;
      const date = document.getElementById("date").value;
      const time = document.getElementById("time").value;
      const description = document.getElementById("description").value;
      const price = "₹" + document.getElementById("price").value;
      const imageFile = document.getElementById("eventImage").files[0];

      const reader = new FileReader();
      reader.onload = function () {
        const imageBase64 = reader.result;

        const newEvent = {
          name,
          artist,
          location,
          date,
          time,
          description,
          price,
          image: imageBase64,
        };

        const existingEvents = JSON.parse(localStorage.getItem("customEvents") || "[]");
        existingEvents.push(newEvent);
        localStorage.setItem("customEvents", JSON.stringify(existingEvents));

        window.location.href = "events.html";
      };

      if (imageFile) {
        reader.readAsDataURL(imageFile);
      }
    });
  </script>

</body>
</html>
