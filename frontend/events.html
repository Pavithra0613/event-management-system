<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Events - CrowdAura</title>
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #1e1e1e;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo img {
      height: 40px;
      width: auto;
    }

    nav a {
      margin-left: 1rem;
      color: white;
      text-decoration: none;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem;
    }

    .page-header h1 {
      margin: 0;
      font-size: 2rem;
    }

    .list-event-btn {
      background-color: #f44336;
      color: white;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
    }

    .concerts {
      padding: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 2rem;
    }

    .concert-card {
      background-color: #1e1e1e;
      padding: 1rem;
      border-radius: 10px;
      box-shadow: 0 0 10px #00000066;
      position: relative;
    }

    .concert-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 1rem;
    }

    .btn, .delete-btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      margin-top: 0.5rem;
      display: inline-block;
    }

    .btn {
      background-color: #f44336;
      color: white;
    }

    .delete-btn {
      background-color: #444;
      color: #ccc;
      margin-left: 0.5rem;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 10;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
    }

    .modal-content {
      background: white;
      color: black;
      margin: 10% auto;
      padding: 2rem;
      border-radius: 8px;
      width: 90%;
      max-width: 400px;
      position: relative;
    }

    .modal-content input,
    .modal-content select {
      width: 100%;
      padding: 0.7rem;
      margin-bottom: 1rem;
    }

    .modal-content button {
      background-color: #f44336;
      color: white;
      border: none;
      padding: 0.7rem 1.2rem;
      border-radius: 5px;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">
      <img src="images/logo.jpg" alt="CrowdAura Logo" />
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="events.html">Events</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <div class="page-header">
    <h1>Events</h1>
    <a href="list-event.html" class="list-event-btn">List Your Own Event</a>
  </div>

  <section class="concerts" id="concertList">
   
  </section>

  <div id="bookModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2 id="modalTitle">Book Tickets</h2>
      <form>
        <input type="text" placeholder="Your Name" required />
        <input type="email" placeholder="Your Email" required />
        <select required>
          <option value="">Select Tickets</option>
          <option value="1">1 Ticket</option>
          <option value="2">2 Tickets</option>
          <option value="3">3 Tickets</option>
          <option value="4">4 Tickets</option>
        </select>
       <button type="button" onclick="redirectToPayment()">Confirm</button>

      </form>
    </div>
  </div>

  <script>
    const events = [
  { name: "Salim-Sulaiman Live in Concert", date: "June 24, 2025", time: "7:00 PM – 10:00 PM", location: "Phoenix Market City", image: "images/salim-sulaiman.jpg", price: "₹999" },
  { name: "Armaan Malik", date: "September 13, 2025", time: "6:30 PM – 9:30 PM", location: "Phoenix Market City", image: "images/armaan-malik.jpg", price: "₹799" },
  { name: "Guns N Roses", date: "May 31, 2025", time: "8:00 PM – 11:00 PM", location: "Racecourse", image: "images/guns-n-roses.jpg", price: "₹1999" },
  { name: "Alan Walker", date: "June 15, 2025", time: "5:00 PM – 10:00 PM", location: "Ozone Urbana", image: "images/alan-walker.jpg", price: "₹1299" },
  { name: "NH7 Weekender", date: "October 5, 2025", time: "2:00 PM – 10:00 PM", location: "Embassy Riding School", image: "images/nh7-weekender.webp", price: "₹1499" },
  { name: "Bangalore Open Air", date: "July 13, 2025", time: "4:00 PM – 10:00 PM", location: "Royal Orchid Resort", image: "images/open-air.jpg", price: "₹999" },
  { name: "Ritviz", date: "August 17, 2025", time: "6:00 PM – 9:00 PM", location: "Manpho Convention Center", image: "images/ritviz.jpg", price: "₹899" },
  { name: "When Chai Met Toast", date: "September 20, 2025", time: "7:00 PM – 9:00 PM", location: "Forum Shantiniketan", image: "images/chai-toast.jpg", price: "₹749" },
  { name: "Dualist Inquiry", date: "June 8, 2025", time: "8:00 PM – 11:00 PM", location: "Gilly's Redefined", image: "images/dualist-inquiry.jpg", price: "₹899" },
  { name: "Parvaaz", date: "July 27, 2025", time: "6:30 PM – 9:00 PM", location: "Indiranagar Social", image: "images/parvaaz.webp", price: "₹699" }
];


    function renderEvents() {
      const concertList = document.getElementById("concertList");
      concertList.innerHTML = "";
      events.forEach(event => concertList.innerHTML += generateCard(event));
      const customEvents = JSON.parse(localStorage.getItem("customEvents") || "[]");
      customEvents.forEach((event, index) => concertList.innerHTML += generateCard(event, true, index));
    }

    function generateCard(event, isCustom = false, index = -1) {
      return `
        <div class="concert-card">
          <img src="${event.image || 'images/default-event.jpg'}" alt="${event.name}" />
          <h3>${event.name}</h3>
          <p>Date: ${event.date}</p>
          <p>Time: ${event.time}</p>
          <p>Location: ${event.location}</p>
          <p>Price: ${event.price || 'N/A'}</p>
          <button class="btn" onclick="openModal('${event.name}')">Book Now</button>
          ${isCustom ? `<button class="delete-btn" onclick="deleteEvent(${index})">Delete</button>` : ""}
        </div>
      `;
    }

    function openModal(concertName) {
      document.getElementById("modalTitle").textContent = "Book Tickets for " + concertName;
      document.getElementById("bookModal").style.display = "block";
    }

    function closeModal() {
      document.getElementById("bookModal").style.display = "none";
    }

    function deleteEvent(index) {
      if (confirm("Are you sure you want to delete this event?")) {
        const events = JSON.parse(localStorage.getItem("customEvents") || "[]");
        events.splice(index, 1);
        localStorage.setItem("customEvents", JSON.stringify(events));
        renderEvents();
      }
    }

    window.onclick = function(event) {
      const modal = document.getElementById("bookModal");
      if (event.target === modal) {
        closeModal();
      }
    };

    window.onload = renderEvents;
  </script>
  <script>
  function redirectToPayment() {
    const name = document.querySelector('input[type="text"]').value;
    const email = document.querySelector('input[type="email"]').value;
    const tickets = document.querySelector('select').value;

    if (!name || !email || !tickets) {
      alert("Please fill all fields");
      return;
    }

    // Redirect to payment.html with query string
    window.location.href = `payment.html?name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&tickets=${tickets}`;
  }
</script>


</body>
</html>
