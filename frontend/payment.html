<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment | CrowdAura</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 700px;
      margin: 40px auto;
      background: #fff;
      padding: 25px 30px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      border-radius: 10px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h2 {
      margin: 0;
    }
    .secure {
      color: green;
      font-size: 14px;
    }
    .summary {
      background: #f9f9f9;
      padding: 15px;
      margin: 20px 0;
      border-radius: 6px;
    }
    .payment-methods {
      margin: 20px 0;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tabs button {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      background: #eee;
      cursor: pointer;
      border-radius: 5px;
    }
    .tabs button.active {
      background: #007BFF;
      color: white;
      border-color: #007BFF;
    }
    .form-section {
      display: none;
    }
    .form-section.active {
      display: block;
    }
    .form-section input, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .pay-btn {
      background: #28a745;
      color: white;
      padding: 15px;
      border: none;
      width: 100%;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }
    .trust {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>CrowdAura</h2>
      <div class="secure">🔒 Secure Payment</div>
    </div>

    <div class="summary">
      <strong>Event:</strong> Live Music Concert<br>
      <strong>Total Amount:</strong> ₹499
    </div>

    <div class="payment-methods">
      <div class="tabs">
        <button class="tab active" data-target="card">Card</button>
        <button class="tab" data-target="upi">UPI</button>
        <button class="tab" data-target="netbanking">Net Banking</button>
        <button class="tab" data-target="wallets">Wallets</button>
      </div>

      <div id="card" class="form-section active">
        <input type="text" placeholder="Card Number" />
        <input type="text" placeholder="Name on Card" />
        <input type="text" placeholder="Expiry (MM/YY)" />
        <input type="password" placeholder="CVV" />
      </div>

      <div id="upi" class="form-section">
        <input type="text" placeholder="Enter UPI ID (e.g. name@upi)" />
      </div>

      <div id="netbanking" class="form-section">
        <select>
          <option>Select Your Bank</option>
          <option>SBI</option>
          <option>ICICI</option>
          <option>HDFC</option>
          <option>Axis</option>
        </select>
      </div>

      <div id="wallets" class="form-section">
        <label><input type="radio" name="wallet"> Paytm</label><br>
        <label><input type="radio" name="wallet"> PhonePe</label><br>
        <label><input type="radio" name="wallet"> Mobikwik</label>
      </div>
    </div>

    <button class="pay-btn">Pay ₹499</button>

    <div class="trust">
      🔐 Your transaction is secured and encrypted.
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll(".tab");
    const forms = document.querySelectorAll(".form-section");

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");

        forms.forEach(f => f.classList.remove("active"));
        document.getElementById(tab.dataset.target).classList.add("active");
      });
    });
  </script>
  <script>
  function getQueryParams() {
    const params = new URLSearchParams(window.location.search);
    return {
      name: params.get("name") || "Guest",
      email: params.get("email") || "",
      tickets: params.get("tickets") || "1",
    };
  }

  const { name, email, tickets } = getQueryParams();

  const summaryBox = document.querySelector(".summary");
  summaryBox.innerHTML = `
  <strong>Name:</strong> ${name}<br>
  <strong>Email:</strong> ${email}<br>
  <strong>Tickets:</strong> ${tickets}
`;


 document.querySelector(".pay-btn").textContent = `Proceed to Pay`;

</script>

</body>
</html>
